<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Fastrack Smart Watch</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <div class="container my-3">
        <div class="row align-items-center">
            <div class="col-md-11 text-start">
                <a href="../index.html" class="btn btn-dark  text-decoration-none">⬅ Back to Home</a>
            </div>
            <div class="col-md-1 text-end">
                    <a class="nav-link active d-flex align-items-center me-3 " href="#">
                        <i class="fa-solid fa-cart-shopping me-1"></i>
                        Cart(<span id="cartCount">0</span>)
                    </a>
            </div>
        </div>




        <div class="row align-items-center">

            <!-- Product Image -->
            <div class="col-md-6 text-center">
                <img src="../assets/img/img1.jpg" class="img-fluid rounded" alt="product">
            </div>

            <!-- Product Details -->
            <div class="col-md-6">
                <h1>Fastrack Smart Watch</h1>

                <p class="text-muted">
                    Fastrack Limitless Glide X Smart Watch with Ultra HD display,
                    long battery life, fitness tracking, and stylish design.
                </p>
                <p>⭐⭐⭐⭐☆ (4.2)</p>

                <h3 class="text-success">₹1,999</h3><br>


                <button class="btn btn-warning rounded-pill px-4 me-2" onclick="addToCart()">
                    Add to Cart
                </button>

                <button class="btn btn-success rounded-pill px-4" onclick="buyNow()">
                    Buy Now
                </button>

            </div>

        </div>
    </div>

    <script src="../assets/js/script.js"> </script>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
